{% extends "admin/change_list.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
.custom-admin-buttons {
    margin-bottom: 20px;
    padding: 15px;
    background: #f8f9fa;
    border-radius: 5px;
    border: 1px solid #dee2e6;
}

.custom-admin-buttons h3 {
    margin: 0 0 15px 0;
    color: #495057;
    font-size: 16px;
}

.custom-admin-buttons .btn {
    margin-right: 10px;
    margin-bottom: 5px;
    padding: 8px 16px;
    text-decoration: none;
    border-radius: 4px;
    display: inline-block;
    font-size: 14px;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background-color: #007cba;
    color: white;
}

.btn-info {
    background-color: #17a2b8;
    color: white;
}

.btn:hover {
    opacity: 0.9;
}

.btn i {
    margin-right: 5px;
}
</style>
{% endblock %}

{% block content_title %}
<div class="custom-admin-buttons">
    <h3><i class="fas fa-tachometer-alt"></i> Teacher Attendance Management</h3>
    <a href="{% url 'attendance:teacher_attendance_dashboard' %}" class="btn btn-primary">
        <i class="fas fa-tachometer-alt"></i> Live Dashboard
    </a>
    <a href="{% url 'attendance:teacher_attendance_reports' %}" class="btn btn-info">
        <i class="fas fa-chart-bar"></i> Detailed Reports
    </a>
    <a href="{% url 'attendance:teacher_activity_logs' %}" class="btn btn-info">
        <i class="fas fa-history"></i> Activity Logs
    </a>
    <a href="{% url 'attendance:manual_teacher_attendance' %}" class="btn btn-primary">
        <i class="fas fa-edit"></i> Manual Entry
    </a>
</div>
{{ block.super }}
{% endblock %}
